<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reseñas - Rick and Morty Store</title>
    <link rel="stylesheet" href="./css/styles.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">Rick and Morty Store</a>
            <button id="menu-toggle" class="menu-toggle" aria-label="Toggle navigation">☰</button>
            <nav class="main-nav" id="main-nav">
                <ul class="nav-list">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="product-list-page.html">Productos</a></li>
                    <li><a href="cart.html">Carrito</a></li>
                    <li><a href="review.html">Reseñas</a></li>
                    <li><a href="form.html">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 800px;">
        <h2 class="title2 text-center mt-4 mb-3">Reseñas de clientes</h2>

        <!-- Estado / mensajes -->
        <p id="statusBox" class="text-center" style="min-height: 1.5rem;"></p>

        <!-- CREATE: formulario de nueva reseña -->
        <form id="reviewForm" class="review-form">
            <h3 class="h5">Dejá tu reseña</h3>
            <div class="mb-3">
                <label for="rName" class="form-label">Nombre</label>
                <input type="text" id="rName" class="form-control" maxlength="60" required>
            </div>
            <div class="mb-3">
                <label for="rText" class="form-label">Reseña</label>
                <textarea id="rText" class="form-control" rows="3" maxlength="300" required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label d-block">Calificación</label>
                <div class="star-rating" id="starRating" role="radiogroup" aria-label="Calificación de 1 a 5 estrellas">
                    <button type="button" class="star" data-value="1" aria-label="1 estrella">★</button>
                    <button type="button" class="star" data-value="2" aria-label="2 estrellas">★</button>
                    <button type="button" class="star" data-value="3" aria-label="3 estrellas">★</button>
                    <button type="button" class="star" data-value="4" aria-label="4 estrellas">★</button>
                    <button type="button" class="star" data-value="5" aria-label="5 estrellas">★</button>
                </div>
                <input type="hidden" id="rRating" required>
            </div>
            <button type="submit" class="btn btn-danger">Enviar reseña</button>
        </form>

        <hr class="my-4">

        <!-- READ: lista de reseñas (cada una con botón Eliminar = DELETE) -->
        <h3 class="h5 mb-3">Reseñas publicadas</h3>
        <div id="reviewsList"></div>
    </main>

    <footer>
        <p>&copy; 2026 Rick and Morty Store</p>
    </footer>

    <!-- config.js define API_URL; debe ir ANTES de reviews-api.js -->
    <script src="./config.js"></script>
    <script src="./reviews-api.js"></script>
    <script src="./cart-badge.js"></script>
</body>
</html>
