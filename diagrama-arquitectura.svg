<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 680" font-family="Segoe UI, Arial, sans-serif">
  <style>
    .box { rx: 10; ry: 10; stroke-width: 2; }
    .lbl { font-size: 13px; fill: #222; text-anchor: middle; }
    .sub { font-size: 11px; fill: #444; text-anchor: middle; }
    .edge { stroke: #555; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    .edgeb { stroke: #555; stroke-width: 2; fill: none; marker-end: url(#arrow); marker-start: url(#arrowS); }
    .dash { stroke: #b85450; stroke-width: 2; fill: none; stroke-dasharray: 5 4; }
    .elabel { font-size: 11px; fill: #666; text-anchor: middle; }
    .title { font-size: 17px; font-weight: 700; fill: #111; text-anchor: middle; }
  </style>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker>
    <marker id="arrowS" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto"><path d="M8,0 L0,3 L8,6 Z" fill="#555"/></marker>
  </defs>

  <text x="410" y="30" class="title">Rick and Morty Store — Arquitectura Serverless (AWS)</text>

  <!-- User -->
  <rect class="box" x="300" y="55" width="220" height="50" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="410" y="85" class="lbl">Usuario (Navegador)</text>

  <!-- CloudFront -->
  <rect class="box" x="300" y="160" width="220" height="60" fill="#ffe6cc" stroke="#d79b00"/>
  <text x="410" y="185" class="lbl">CloudFront</text>
  <text x="410" y="203" class="sub">HTTPS + CDN</text>

  <!-- S3 -->
  <rect class="box" x="560" y="160" width="240" height="60" fill="#d5e8d4" stroke="#82b366"/>
  <text x="680" y="183" class="lbl">S3 (bucket privado)</text>
  <text x="680" y="200" class="sub">Frontend HTML/CSS/JS</text>

  <!-- API Gateway -->
  <rect class="box" x="290" y="285" width="240" height="60" fill="#ffe6cc" stroke="#d79b00"/>
  <text x="410" y="310" class="lbl">API Gateway (HTTP API)</text>
  <text x="410" y="328" class="sub">GET / POST / DELETE /reviews</text>

  <!-- Lambda -->
  <rect class="box" x="290" y="410" width="240" height="60" fill="#ffe6cc" stroke="#d79b00"/>
  <text x="410" y="435" class="lbl">Lambda (Python + boto3)</text>
  <text x="410" y="453" class="sub">restrepo-review-api — enruta el CRUD</text>

  <!-- IAM -->
  <rect class="box" x="575" y="410" width="225" height="60" fill="#f8cecc" stroke="#b85450" stroke-dasharray="5 4"/>
  <text x="687" y="435" class="lbl">IAM Role</text>
  <text x="687" y="453" class="sub">lab-lambda-exec (acceso DynamoDB)</text>

  <!-- DynamoDB -->
  <ellipse cx="410" cy="545" rx="90" ry="14" fill="#dae8fc" stroke="#6c8ebf"/>
  <path d="M320,545 v70 a90,14 0 0 0 180,0 v-70" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="410" y="595" class="lbl">DynamoDB</text>
  <text x="410" y="613" class="sub">tabla restrepo-review (PK: id)</text>

  <!-- Edges -->
  <path class="edge" d="M410,105 L410,158"/>
  <text x="440" y="135" class="elabel">HTTPS</text>

  <path class="edge" d="M520,190 L558,190"/>
  <text x="540" y="150" class="elabel">OAC</text>

  <path class="edge" d="M410,220 L410,283"/>
  <text x="455" y="255" class="elabel">fetch() JSON</text>

  <path class="edge" d="M410,345 L410,408"/>
  <text x="438" y="380" class="elabel">invoca</text>

  <path class="edgeb" d="M410,470 L410,528"/>
  <text x="455" y="503" class="elabel">read / write</text>

  <path class="dash" d="M530,440 L573,440"/>
  <text x="552" y="430" class="elabel">asume</text>
</svg>
